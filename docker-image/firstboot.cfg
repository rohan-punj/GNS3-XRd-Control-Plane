!! XRd first-boot configuration
!! Creates a default admin user with full privileges
!!
username admin
 group root-lr
 group netadmin
 secret cisco
!
!! Optional: enable SSH (uncomment if desired; requires crypto key generation)
!
! ssh server v2
! ssh server vrf default
!
!! Optional: enable management interface via DHCP
!
! interface MgmtEth0/RP0/CPU0/0
!  ipv4 address dhcp
!  no shutdown
! !
!
end
